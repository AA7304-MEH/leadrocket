[build]
  # Directory to change to before starting a build
  base = "."
  # Directory that contains the deploy-ready HTML files and assets generated by the build
  publish = "dist"
  # Default build command
  command = "npm run build"

[build.environment]
  # Node.js version for builds
  NODE_VERSION = "18"

[[redirects]]
  # SPA fallback - redirect all routes to index.html for client-side routing
  from = "/*"
  to = "/index.html"
  status = 200

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Environment variables that should be set in Netlify dashboard
# These are just comments - actual values need to be set in Netlify UI
# Required:
# - NODE_ENV=production
# - FRONTEND_URL=https://your-app-name.netlify.app
#
# Database (MongoDB Atlas):
# - MONGODB_URI=mongodb+srv://username:password@cluster.mongodb.net/leadrockets
#
# Email (Gmail):
# - SMTP_USER=your-email@gmail.com
# - SMTP_PASS=your-gmail-app-password
#
# JWT Secrets (generate new ones for production):
# - JWT_SECRET=your-production-jwt-secret-here
# - JWT_REFRESH_SECRET=your-production-refresh-secret-here
#
# CRM Integration:
# - HUBSPOT_API_KEY=6bbd1422-ebc5-4240-813a-a7bfe2d00455
#
# AI Enhancement (Optional):
# - GOOGLE_AI_API_KEY=your-google-ai-api-key